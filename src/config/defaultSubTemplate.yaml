# sublinker 一级订阅模板
# 规则模式: V4-绕过大陆 (Whitelist) - 完全对齐 v2rayN
# 规则来源: Loyalsoldier/v2ray-rules-dat (增强版 geoip/geosite)
# 兼容: mihomo (Clash Meta)

port: 7890
socks-port: 7891
allow-lan: false
mode: rule
log-level: info
external-controller: 127.0.0.1:9090

# 性能与稳定性优化
tcp-concurrent: true
unified-delay: true

# 开启 IPv6：允许 mihomo 内核建立 IPv6 出站连接，配合 proxy-providers 的 ip-version: ipv6-prefer
# 使 DMIT 节点走 CN2 GIA / CMIN2 IPv6 优化路由
# 注意：dns.ipv6 单独设为 false，避免向客户端返回 AAAA 记录引发客户端侧直连
ipv6: true

sniffer:
  enable: true
  sniff:
    TLS:
      ports: [443, 8443]
    HTTP:
      ports: [80, 8080-8880]
      override-destination: true
  # QUIC 嗅探已移除：端口代理模式（无 TUN）无法捕获 UDP 流量，QUIC 嗅探永远不会触发
  # 若启用 TUN 模式，可在此处恢复：QUIC: { ports: [443, 8443] }
  skip-domain:
    - "Mijia Cloud"
    - "+.push.apple.com"

# GEO 数据模式: true 使用 .dat 文件，false 使用 .mmdb 文件
geodata-mode: true

# GEO 自动更新
geo-auto-update: true
geo-update-interval: 24

# 自定义 GEO 下载地址 (Loyalsoldier 增强版)
# 若 jsDelivr 不可用可改用: fastly.jsdelivr.net 或 raw.githubusercontent.com
geox-url:
  geoip: '__API_DOMAIN__/geox/geoip.dat'
  geosite: '__API_DOMAIN__/geox/geosite.dat'

# DNS 配置 - 对齐 v2rayN 的 DNS 行为
dns:
  enable: true
  listen: 127.0.0.1:1053
  ipv6: false
  enhanced-mode: fake-ip
  cache-algorithm: arc
  prefer-h3: false
  fake-ip-range: 198.18.0.1/16
  fake-ip-filter:
    - '+.lan'
    - '+.local'
    - '+.ptlogin2.qq.com'
    # NTP 时间同步：直接复用 Loyalsoldier/v2ray-rules-dat 内置的 NTP 类目
    # 三个类目覆盖国际/国内/日本主流 NTP 服务器，比手写通配符更全
    - 'geosite:category-ntp'
    - 'geosite:category-ntp-cn'
    - 'geosite:category-ntp-jp'
    # STUN/WebRTC：音视频通话（微信、腾讯会议等）需要真实 IP 建立点对点连接
    # geosite 上游无 STUN 类目，只能显式列举主流 STUN 主机
    # 注意：mihomo 通配符 '+' 仅作前缀使用，'*' 仅匹配单段，不可与 '+' 组合
    - '+.l.google.com'
    - '+.miwifi.com'
    - '+.voip.qq.com'
    - 'stun.qq.com'

  # 用于解析 DoH/DoT 域名的 DNS，必须为纯 IP
  default-nameserver:
    - 119.29.29.29
    - 223.5.5.5

  # 主要 DNS 服务器
  nameserver:
    - https://doh.pub/dns-query
    - https://dns.alidns.com/dns-query

  # 海外 DNS 回退
  # 853 端口（DoT）已被 GFW 全面封锁（自 2021 年起）；8.8.8.8/1.1.1.1 IP 在国内也被封
  # 加 #PROXY 让 fallback 查询走代理通道，彻底绕过封锁
  fallback:
    - https://8.8.8.8/dns-query#PROXY
    - https://1.1.1.1/dns-query#PROXY

  fallback-filter:
    geoip: true
    geoip-code: CN
    # 过滤 DNS 污染返回的保留/无效地址
    ipcidr:
      - 240.0.0.0/4
    # GFW 已知被墙域名直接走 fallback，无需等 nameserver 的污染结果
    geosite:
      - gfw

  # 专门用于解析代理节点域名（在代理建立之前运行，必须直接可达）
  # 官方示例使用国内 DoH：proxy 尚未就绪时国内 DoH 比境外 DNS 更稳定可达
  proxy-server-nameserver:
    - https://doh.pub/dns-query
    - https://dns.alidns.com/dns-query

  # 按域名指定 DNS
  nameserver-policy:
    # 中国域名 → 国内 DNS
    'geosite:cn,private':
      - https://doh.pub/dns-query
      - https://dns.alidns.com/dns-query
    # 被墙/非中国域名 → 国外 DoH（走代理）
    # 8.8.8.8/1.1.1.1 IP 在国内直接被封，#PROXY 让查询走代理通道
    # google/anthropic/openai 已包含在 geolocation-!cn 中，无需重复列出
    'geosite:gfw,geolocation-!cn':
      - https://8.8.8.8/dns-query#PROXY
      - https://1.1.1.1/dns-query#PROXY

profile:
  store-selected: true
  store-fake-ip: true

proxy-providers:
  main:
    type: http
    url: '__API_DOMAIN__/provider?t=__TOKEN__'
    path: ./providers/main.yaml
    interval: 86400
    override:
      # DMIT 节点的 CN2 GIA / CMIN2 优化路由通过 IPv6 提供，ipv6-prefer 走优化线路
      ip-version: ipv6-prefer
    health-check:
      enable: true
      url: https://cp.cloudflare.com/generate_204
      interval: 300
      timeout: 5000
      lazy: true

proxy-groups:
  - name: PROXY
    type: select
    use:
      - main

rules:
  # ============================================
  # V4-绕过大陆 (Whitelist) - 完全对齐 v2rayN
  # 使用 Loyalsoldier 增强版 geosite/geoip
  # ============================================

  # 广告拦截 (可选，如需关闭删除此行)
  - GEOSITE,category-ads-all,REJECT

  # QUIC (UDP 443) 拦截规则：仅 TUN 模式下取消注释才有意义
  # 端口代理模式不经手 UDP，规则永不触发；带 GEOSITE 子条件的 AND 还有上游 Bug (#1367/2263)
  # - AND,((NETWORK,UDP),(DST-PORT,443)),REJECT

  # 特殊代理规则 - 对齐 v2rayN (需要代理才能稳定访问)
  - DOMAIN,www.icloud.com,PROXY
  - DOMAIN-SUFFIX,icloud-content.com,PROXY
  # 私有域名 → 直连 (geosite:private)
  - GEOSITE,private,DIRECT

  # iCloud 服务 → 直连 (除上述特殊域名外)
  - GEOSITE,icloud,DIRECT

  # Apple 中国服务 → 直连 (Loyalsoldier 增强)
  - GEOSITE,apple-cn,DIRECT

  # 游戏平台中国服务 → 直连 (Steam/EA/Blizzard 等)
  - GEOSITE,category-games@cn,DIRECT

  # 中国顶级域名 → 直连
  - GEOSITE,tld-cn,DIRECT

  # 非中国域名 → 代理 (geosite:geolocation-!cn)
  # 注意：此规则必须放在 geosite:cn 前面，这是针对 Loyalsoldier 数据集的正确做法，并非违反 mihomo 规范。
  # 原因：Loyalsoldier 将 apple.china.conf、google.china.conf 等域名同时收录进了 geolocation-!cn，
  # 若 cn → DIRECT 放在前面，这些域名会被提前匹配为直连，导致行为异常。
  # mihomo 本身不强制两者顺序，顺序差异属于语义层面，取决于所用的 geo 数据来源。
  - GEOSITE,geolocation-!cn,PROXY

  # 中国域名 → 直连 (geosite:cn)
  - GEOSITE,cn,DIRECT

  # 私有/局域网 IP → 直连 (mihomo 推荐写法)
  - GEOIP,lan,DIRECT,no-resolve

  # 中国 IP → 直连 (geoip:cn)
  - GEOIP,CN,DIRECT,no-resolve

  # 其余全部 → 代理
  - MATCH,PROXY
