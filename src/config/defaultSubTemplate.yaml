# CloakGate 一级订阅模板
# __TOKEN__ 占位符会被替换为真实 token

port: 7890
socks-port: 7891
allow-lan: true
mode: Rule
log-level: info
external-controller: 127.0.0.1:9090

proxy-providers:
  main:
    type: http
    url: 'http://localhost:9007/provider?token=__TOKEN__'
    path: ./providers/main.yaml
    interval: 600
    health-check:
      enable: true
      url: http://www.gstatic.com/generate_204
      interval: 300

proxy-groups:
  - name: 🚀 节点选择
    type: select
    use:
      - main
    proxies:
      - ♻️ 自动选择
      - DIRECT

  - name: ♻️ 自动选择
    type: url-test
    use:
      - main
    url: http://www.gstatic.com/generate_204
    interval: 300
    tolerance: 50

  - name: 🎯 全球直连
    type: select
    proxies:
      - DIRECT
      - 🚀 节点选择

  - name: 🛑 广告拦截
    type: select
    proxies:
      - REJECT
      - DIRECT

  - name: 🐟 漏网之鱼
    type: select
    proxies:
      - 🚀 节点选择
      - 🎯 全球直连
      - ♻️ 自动选择

rules:
  # 广告拦截
  - DOMAIN-SUFFIX,ad.com,🛑 广告拦截
  
  # 国内直连
  - DOMAIN-SUFFIX,cn,🎯 全球直连
  - DOMAIN-KEYWORD,baidu,🎯 全球直连
  - DOMAIN-KEYWORD,aliyun,🎯 全球直连
  - DOMAIN-KEYWORD,taobao,🎯 全球直连
  - DOMAIN-KEYWORD,tencent,🎯 全球直连
  - DOMAIN-KEYWORD,qq,🎯 全球直连
  - DOMAIN-KEYWORD,weixin,🎯 全球直连
  - DOMAIN-KEYWORD,bilibili,🎯 全球直连
  
  # 国外代理
  - DOMAIN-SUFFIX,google.com,🚀 节点选择
  - DOMAIN-SUFFIX,googleapis.com,🚀 节点选择
  - DOMAIN-SUFFIX,gstatic.com,🚀 节点选择
  - DOMAIN-SUFFIX,youtube.com,🚀 节点选择
  - DOMAIN-SUFFIX,ytimg.com,🚀 节点选择
  - DOMAIN-SUFFIX,github.com,🚀 节点选择
  - DOMAIN-SUFFIX,githubusercontent.com,🚀 节点选择
  - DOMAIN-SUFFIX,twitter.com,🚀 节点选择
  - DOMAIN-SUFFIX,x.com,🚀 节点选择
  - DOMAIN-SUFFIX,twimg.com,🚀 节点选择
  - DOMAIN-SUFFIX,telegram.org,🚀 节点选择
  - DOMAIN-SUFFIX,t.me,🚀 节点选择
  - DOMAIN-SUFFIX,openai.com,🚀 节点选择
  - DOMAIN-SUFFIX,anthropic.com,🚀 节点选择
  
  # GeoIP 规则
  - GEOIP,CN,🎯 全球直连
  
  # 兜底规则
  - MATCH,🐟 漏网之鱼
