# sublinker 一级订阅模板
# 规则模式: V4-绕过大陆 (Whitelist) - 完全对齐 v2rayN
# 规则来源: Loyalsoldier/v2ray-rules-dat (增强版 geoip/geosite)
# 兼容: mihomo (Clash Meta)

port: 7890
socks-port: 7891
allow-lan: true
mode: rule
log-level: info
external-controller: 127.0.0.1:9090

# 全局客户端指纹模拟 - 提高 ChatGPT/Cloudflare 兼容性
global-client-fingerprint: chrome

# 性能与稳定性优化
tcp-concurrent: true
unified-delay: true

# 禁用 IPv6 以防止 macOS 下的流量泄漏
ipv6: false

# 核心 TUN 配置 - 确保在 macOS 下自动路由和接管 DNS
tun:
  enable: true
  stack: mixed
  auto-route: true
  auto-detect-interface: true
  dns-hijack:
    - "any:53"
    - "tcp://any:53"

# 开启嗅探器以在 TUN 模式下辅助解析域名
sniffer:
  enable: true
  sniff:
    TLS:
      ports: [443, 8443]
    HTTP:
      ports: [80, 8080-8880]
      override-destination: true
    QUIC:
      ports: [443, 8443]


# GEO 数据模式: true 使用 .dat 文件，false 使用 .mmdb 文件
geodata-mode: true

# GEO 自动更新
geo-auto-update: true
geo-update-interval: 24

# 自定义 GEO 下载地址 (Loyalsoldier 增强版)
# 若 jsDelivr 不可用可改用: fastly.jsdelivr.net 或 raw.githubusercontent.com
geox-url:
  geoip: 'https://cdn.jsdelivr.net/gh/Loyalsoldier/v2ray-rules-dat@release/geoip.dat'
  geosite: 'https://cdn.jsdelivr.net/gh/Loyalsoldier/v2ray-rules-dat@release/geosite.dat'

# DNS 配置 - 对齐 v2rayN 的 DNS 行为
dns:
  enable: true
  listen: 0.0.0.0:53
  ipv6: false
  enhanced-mode: fake-ip
  cache-algorithm: arc
  prefer-h3: false
  fake-ip-range: 198.18.0.1/16
  fake-ip-filter:
    - '*.lan'
    - '*.local'
    - localhost.ptlogin2.qq.com

  # 用于解析 DoH/DoT 域名的 DNS，必须为纯 IP
  default-nameserver:
    - 119.29.29.29
    - 223.5.5.5

  # 主要 DNS 服务器
  nameserver:
    - https://doh.pub/dns-query
    - https://dns.alidns.com/dns-query

  # 海外 DNS 回退
  fallback:
    - tls://8.8.8.8:853
    - tls://1.1.1.1:853

  fallback-filter:
    geoip: true
    geoip-code: CN

  # 按域名指定 DNS
  nameserver-policy:
    # 中国域名 → 国内 DNS
    'geosite:cn,private':
      - https://doh.pub/dns-query
      - https://dns.alidns.com/dns-query
    # 被墙/非中国域名 + AI 服务 → 国外 DNS (含 github/docker 等，防污染)
    'geosite:gfw,geolocation-!cn,google,anthropic,openai':
      - tls://8.8.8.8:853
      - tls://1.1.1.1:853

proxy-providers:
  main:
    type: http
    url: '__API_DOMAIN__/provider?token=__TOKEN__'
    path: ./providers/main.yaml
    interval: 600
    format: yaml
    health-check:
      enable: true
      url: https://cp.cloudflare.com/generate_204
      interval: 300
      timeout: 5000
      lazy: true

proxy-groups:
  - name: PROXY
    type: select
    use:
      - main

rules:
  # ============================================
  # V4-绕过大陆 (Whitelist) - 完全对齐 v2rayN
  # 使用 Loyalsoldier 增强版 geosite/geoip
  # ============================================

  # 广告拦截 (可选，如需关闭删除此行)
  - GEOSITE,category-ads-all,REJECT

  # AI 服务专项优化 (ChatGPT, Claude, Gemini) - 显式代理并拦截 QUIC 确保稳定
  # 注意：拦截规则必须放在允许规则之前，否则会被 PROXY 规则抢先匹配
  - AND,((NETWORK,UDP),(DST-PORT,443),(GEOSITE,openai)),REJECT
  - AND,((NETWORK,UDP),(DST-PORT,443),(GEOSITE,anthropic)),REJECT
  - AND,((NETWORK,UDP),(DST-PORT,443),(GEOSITE,google)),REJECT

  - GEOSITE,openai,PROXY
  - GEOSITE,anthropic,PROXY
  - GEOSITE,google,PROXY
  - DOMAIN-KEYWORD,openai,PROXY
  - DOMAIN-KEYWORD,anthropic,PROXY
  - DOMAIN-KEYWORD,google,PROXY
  - DOMAIN-SUFFIX,chatgpt.com,PROXY
  - DOMAIN-SUFFIX,claude.ai,PROXY
  - DOMAIN-SUFFIX,gemini.google.com,PROXY

  # 特殊代理规则 - 对齐 v2rayN (需要代理才能稳定访问)
  - DOMAIN,www.icloud.com,PROXY
  - DOMAIN-SUFFIX,icloud-content.com,PROXY
  # 私有域名 → 直连 (geosite:private)
  - GEOSITE,private,DIRECT

  # iCloud 服务 → 直连 (除上述特殊域名外)
  - GEOSITE,icloud,DIRECT

  # Apple 中国服务 → 直连 (Loyalsoldier 增强)
  - GEOSITE,apple-cn,DIRECT

  # 游戏平台中国服务 → 直连 (Steam/EA/Blizzard 等)
  - GEOSITE,category-games@cn,DIRECT

  # 中国顶级域名 → 直连
  - GEOSITE,tld-cn,DIRECT

  # 中国域名 → 直连 (geosite:cn)
  - GEOSITE,cn,DIRECT

  # 非中国域名 → 代理 (对齐 v2rayN geolocation-!cn)
  - GEOSITE,geolocation-!cn,PROXY

  # 私有 IP → 直连 (geoip:private)
  - GEOIP,private,DIRECT,no-resolve

  # 中国 IP → 直连 (geoip:cn)
  - GEOIP,CN,DIRECT,no-resolve

  # 其余全部 → 代理
  - MATCH,PROXY
