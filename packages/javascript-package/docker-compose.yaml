services:
  cloakgate:
    build: .
    container_name: cloakgate
    restart: unless-stopped
    ports:
      - "3000:3000"
    volumes:
      # 持久化数据库
      - ../../data:/app/data
    environment:
      - NODE_ENV=production
      - PORT=3000
      - DB_PATH=/app/data/cloakgate.db
      # 可选：自定义 API 域名
      # - API_DOMAIN=https://api.starying.top
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/health"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 5s
