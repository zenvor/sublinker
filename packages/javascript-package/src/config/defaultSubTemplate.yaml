# CloakGate 一级订阅模板
# 规则模式: V4-绕过大陆 (Whitelist) - 完全对齐 v2rayN
# 规则来源: Loyalsoldier/v2ray-rules-dat (增强版 geoip/geosite)
# 兼容: mihomo (Clash Meta)

port: 7890
socks-port: 7891
allow-lan: true
mode: rule
log-level: info
external-controller: 127.0.0.1:9090

# GEO 数据模式: true 使用 .dat 文件，false 使用 .mmdb 文件
geodata-mode: true

# GEO 自动更新
geo-auto-update: true
geo-update-interval: 24

# 自定义 GEO 下载地址 (Loyalsoldier 增强版)
geox-url:
  geoip: 'https://cdn.jsdelivr.net/gh/Loyalsoldier/v2ray-rules-dat@release/geoip.dat'
  geosite: 'https://cdn.jsdelivr.net/gh/Loyalsoldier/v2ray-rules-dat@release/geosite.dat'

# DNS 配置 - 对齐 v2rayN 的 DNS 行为
dns:
  enable: true
  listen: 0.0.0.0:53
  enhanced-mode: fake-ip
  fake-ip-range: 198.18.0.1/16
  fake-ip-filter:
    - '*.lan'
    - '*.local'
    - localhost.ptlogin2.qq.com

  # 用于解析 DoH/DoT 域名的 DNS，必须为纯 IP
  default-nameserver:
    - 119.29.29.29
    - 223.5.5.5

  # 主要 DNS 服务器
  nameserver:
    - https://doh.pub/dns-query
    - https://dns.alidns.com/dns-query

  # 海外 DNS 回退
  fallback:
    - tls://8.8.8.8:853
    - tls://1.1.1.1:853

  fallback-filter:
    geoip: true
    geoip-code: CN

  # 按域名指定 DNS
  nameserver-policy:
    # 中国域名 → 国内 DNS
    'geosite:cn,private':
      - https://doh.pub/dns-query
      - https://dns.alidns.com/dns-query
    # 开发者常用网站 → 国外 DNS (防止 DNS 污染)
    'geosite:github':
      - tls://1.1.1.1:853
      - tls://8.8.8.8:853
    'geosite:docker':
      - tls://1.1.1.1:853
      - tls://8.8.8.8:853

proxy-providers:
  main:
    type: http
    url: '__API_DOMAIN__/provider?token=__TOKEN__'
    path: ./providers/main.yaml
    interval: 600
    format: yaml
    health-check:
      enable: true
      url: https://cp.cloudflare.com/generate_204
      interval: 300
      timeout: 5000
      lazy: true

proxy-groups:
  - name: PROXY
    type: select
    use:
      - main
    proxies:
      - DIRECT

rules:
  # ============================================
  # V4-绕过大陆 (Whitelist) - 完全对齐 v2rayN
  # 使用 Loyalsoldier 增强版 geosite/geoip
  # ============================================

  # 广告拦截 (可选，如需关闭删除此行)
  - GEOSITE,category-ads-all,REJECT

  # 特殊代理规则 - 对齐 v2rayN (需要代理才能稳定访问)
  - DOMAIN,www.icloud.com,PROXY
  - DOMAIN-SUFFIX,icloud-content.com,PROXY
  - GEOSITE,google,PROXY

  # 私有域名 → 直连 (geosite:private)
  - GEOSITE,private,DIRECT

  # iCloud 服务 → 直连 (除上述特殊域名外)
  - GEOSITE,icloud,DIRECT

  # Apple 中国服务 → 直连 (Loyalsoldier 增强)
  - GEOSITE,apple-cn,DIRECT

  # 游戏平台中国服务 → 直连 (Steam/EA/Blizzard 等)
  - GEOSITE,category-games@cn,DIRECT

  # 中国顶级域名 → 直连
  - GEOSITE,tld-cn,DIRECT

  # 中国域名 → 直连 (geosite:cn)
  - GEOSITE,cn,DIRECT

  # 非中国域名 → 代理 (对齐 v2rayN geolocation-!cn)
  - GEOSITE,geolocation-!cn,PROXY

  # 私有 IP → 直连 (geoip:private)
  - GEOIP,private,DIRECT,no-resolve

  # 中国 IP → 直连 (geoip:cn)
  - GEOIP,CN,DIRECT,no-resolve

  # 其余全部 → 代理
  - MATCH,PROXY
