[package]
name = "rust-package"
version = "0.1.0"
edition = "2024"

[dependencies]
# --- Web Framework & Async Runtime ---
axum = "0.8.7"
tokio = { version = "1.48.0", features = ["full"] }

# --- Configuration Management ---
config = { version = "0.15.19", features = ["toml"] }

# --- Serialization ---
serde = { version = "1.0.228", features = ["derive"] }

# --- Logging & Tracing ---
tracing = "0.1.43"
tracing-subscriber = { version = "0.3.22", features = ["fmt"] }
dotenvy = "0.15.7"
