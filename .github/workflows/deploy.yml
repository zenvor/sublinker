name: Deploy to VPS

on:
  push:
    branches:
      - master
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  deployPath: /opt/CloakGate
  appName: cloakgate
  servicePort: 3000

jobs:
  lint:
    name: ESLint Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "npm"

      - name: Install dependencies
        run: npm ci
        working-directory: packages/javascript-package

      - name: Run ESLint
        run: npm run lint
        working-directory: packages/javascript-package

  deploy:
    name: Upload and restart service
    runs-on: ubuntu-latest
    needs: lint
    environment: production
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Prepare SSH key
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p ~/.ssh
          printf '%s\n' "${{ secrets.VPS_SSH_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H -p "${{ secrets.VPS_PORT || 22 }}" "${{ secrets.VPS_HOST }}" >> ~/.ssh/known_hosts

      - name: Upload project archive to server
        shell: bash
        run: |
          set -euo pipefail
          tar -czf /tmp/cloakgate-deploy.tgz \
            --exclude=".git" \
            --exclude=".github" \
            --exclude="node_modules" \
            --exclude="logs" \
            .

          scp -i ~/.ssh/id_ed25519 -P "${{ secrets.VPS_PORT || 22 }}" /tmp/cloakgate-deploy.tgz "${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}:/tmp/cloakgate-deploy.tgz"

      - name: Install and restart app on server
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT || 22 }}
          fingerprint: ${{ secrets.VPS_HOST_FINGERPRINT }}
          script: |
            set -euo pipefail
            mkdir -p "${{ env.deployPath }}"
            rm -rf "${{ env.deployPath }}"/*
            tar -xzf /tmp/cloakgate-deploy.tgz -C "${{ env.deployPath }}"
            rm -f /tmp/cloakgate-deploy.tgz

            # 避免 source nvm.sh（在严格模式下可能触发 unbound variable）。
            if ! command -v node >/dev/null 2>&1; then
              latest_node_dir="$(ls -1d "$HOME/.nvm/versions/node/"*/ 2>/dev/null | sort -V | tail -n 1 || true)"
              if [ -n "${latest_node_dir:-}" ]; then
                export PATH="$latest_node_dir/bin:$PATH"
              fi
            fi
            command -v node >/dev/null 2>&1 || { echo "node not found on server"; exit 1; }

            cd "${{ env.deployPath }}/packages/javascript-package"
            npm ci --omit=dev

            cd "${{ env.deployPath }}"
            pm2 describe "${{ env.appName }}" >/dev/null 2>&1 && pm2 restart "${{ env.appName }}" || pm2 start ecosystem.config.cjs --only "${{ env.appName }}"
            sleep 3
            curl -fsS "http://localhost:${{ env.servicePort }}/health"
            pm2 save
