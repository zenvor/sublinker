name: Deploy to VPS

on:
  push:
    branches:
      - master
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  deployPath: /opt/CloakGate
  appName: cloakgate
  servicePort: 3000

jobs:
  lint:
    name: ESLint Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "npm"

      - name: Install dependencies
        run: npm ci
        working-directory: packages/javascript-package

      - name: Run ESLint
        run: npm run lint
        working-directory: packages/javascript-package

  deploy:
    name: Upload and restart service
    runs-on: ubuntu-latest
    needs: lint
    environment: production
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Prepare SSH key
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p ~/.ssh
          printf '%s\n' "${{ secrets.VPS_SSH_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H -p "${{ secrets.VPS_PORT || 22 }}" "${{ secrets.VPS_HOST }}" >> ~/.ssh/known_hosts

      - name: Sync project files to server
        shell: bash
        run: |
          set -euo pipefail
          rsync -az --delete \
            --exclude ".git/" \
            --exclude ".github/" \
            --exclude "node_modules/" \
            --exclude "logs/" \
            -e "ssh -i ~/.ssh/id_ed25519 -p ${{ secrets.VPS_PORT || 22 }}" \
            ./ "${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}:${{ env.deployPath }}/"

      - name: Install and restart app on server
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT || 22 }}
          fingerprint: ${{ secrets.VPS_HOST_FINGERPRINT }}
          script: |
            set -euo pipefail
            if [ -s "$HOME/.nvm/nvm.sh" ]; then
              . "$HOME/.nvm/nvm.sh"
              nvm use --lts >/dev/null || true
            fi

            cd "${{ env.deployPath }}/packages/javascript-package"
            npm ci --omit=dev

            cd "${{ env.deployPath }}"
            pm2 describe "${{ env.appName }}" >/dev/null 2>&1 && pm2 restart "${{ env.appName }}" || pm2 start ecosystem.config.cjs --only "${{ env.appName }}"
            sleep 3
            curl -fsS "http://localhost:${{ env.servicePort }}/health"
            pm2 save
