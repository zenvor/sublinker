name: Deploy to VPS

on:
  push:
    branches:
      - master
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  appName: sublinker
  servicePort: 3000
  deployPath: /opt/sublinker

jobs:
  lint:
    name: ESLint Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint
        run: npm run lint

  package:
    name: Build release artifact
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Create release archive
        run: |
          set -euo pipefail
          archive_file="/tmp/release-${{ github.sha }}.tar.gz"
          tar \
            --exclude=".git" \
            --exclude="node_modules" \
            --exclude="data" \
            --exclude="logs" \
            --exclude=".env" \
            --exclude="release.tar.gz" \
            -czf "$archive_file" .
          mv "$archive_file" release.tar.gz

      - name: Upload release archive
        uses: actions/upload-artifact@v4
        with:
          name: release-archive
          path: release.tar.gz
          if-no-files-found: error

  deploy:
    name: Deploy release to project root
    runs-on: ubuntu-latest
    needs: package
    steps:
      - name: Download release archive
        uses: actions/download-artifact@v4
        with:
          name: release-archive
          path: .

      - name: Upload release archive to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT || 22 }}
          source: release.tar.gz
          target: /tmp/sublinker-${{ github.sha }}
          overwrite: true

      - name: Deploy on server through SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT || 22 }}
          script: |
            set -euo pipefail
            deploy_path="${{ env.deployPath }}"
            archive_dir="/tmp/sublinker-${{ github.sha }}"
            archive_file="$archive_dir/release.tar.gz"
            unpack_dir="$archive_dir/unpacked"
            mkdir -p "$deploy_path/data" "$deploy_path/logs"

            if [ ! -f "$archive_file" ]; then
              echo "发布包不存在: $archive_file"
              exit 1
            fi

            if [ ! -f "$deploy_path/.env" ]; then
              echo "缺少环境变量文件: $deploy_path/.env"
              exit 1
            fi

            # 尝试加载 nvm，以保证 node/npm/pm2 在非交互 shell 中可用。
            export NVM_DIR="$HOME/.nvm"
            if [ -s "$NVM_DIR/nvm.sh" ]; then
              . "$NVM_DIR/nvm.sh"
            fi

            if ! command -v node >/dev/null 2>&1; then
              latest_node_dir="$(ls -1d "$HOME/.nvm/versions/node/"*/ 2>/dev/null | sort -V | tail -n 1 || true)"
              if [ -n "${latest_node_dir:-}" ]; then
                export PATH="$latest_node_dir/bin:$PATH"
              fi
            fi
            command -v node >/dev/null 2>&1 || { echo "node not found on server"; exit 1; }
            command -v npm >/dev/null 2>&1 || { echo "npm not found on server"; exit 1; }
            command -v pm2 >/dev/null 2>&1 || { echo "pm2 not found on server"; exit 1; }

            rm -rf "$unpack_dir"
            mkdir -p "$unpack_dir"
            tar -xzf "$archive_file" -C "$unpack_dir"

            find "$deploy_path" -mindepth 1 -maxdepth 1 \
              ! -name "data" \
              ! -name "logs" \
              ! -name ".env" \
              -exec rm -rf {} +

            cp -a "$unpack_dir"/. "$deploy_path"/
            rm -rf "$archive_dir"

            cd "$deploy_path"
            npm ci --omit=dev

            # 根据 PM2 当前进程情况决定启动策略：
            # 1) 无进程：直接 start
            # 2) 有进程且包含当前应用：使用 ecosystem restart，确保配置同步
            # 3) 有进程但不包含当前应用：start
            pm2_process_count="$(pm2 jlist | node -e "let data='';process.stdin.on('data',chunk=>data+=chunk);process.stdin.on('end',()=>{try{const list=JSON.parse(data);process.stdout.write(String(Array.isArray(list)?list.length:0));}catch{process.stdout.write('0');}})")"
            if [ "$pm2_process_count" -eq 0 ]; then
              echo "PM2 进程列表为空，执行首次启动"
              pm2 start ecosystem.config.cjs --only "${{ env.appName }}" --update-env
            else
              app_exists="$(pm2 jlist | node -e "const appName=process.argv[1];let data='';process.stdin.on('data',chunk=>data+=chunk);process.stdin.on('end',()=>{try{const list=JSON.parse(data);const exists=Array.isArray(list)&&list.some(item=>item&&item.name===appName);process.stdout.write(exists?'1':'0');}catch{process.stdout.write('0');}})" "${{ env.appName }}")"
              if [ "$app_exists" = "1" ]; then
                echo "检测到 ${{ env.appName }} 已存在，执行基于 ecosystem 的重启"
                pm2 restart ecosystem.config.cjs --only "${{ env.appName }}" --update-env
              else
                echo "PM2 当前有进程，但不存在 ${{ env.appName }}，执行启动"
                pm2 start ecosystem.config.cjs --only "${{ env.appName }}" --update-env
              fi
            fi
            # 健康检查端口优先读取线上 .env 的 PORT，缺失时回退到 workflow 默认值。
            health_port="$(node -e "const fs=require('fs');let port='${{ env.servicePort }}';if(fs.existsSync('.env')){for(const line of fs.readFileSync('.env','utf8').split(/\r?\n/)){const match=line.match(/^\s*PORT\s*=\s*(.+)\s*$/);if(match){const parsed=match[1].split('#')[0].trim().replace(/^['\"]|['\"]$/g,'');if(parsed){port=parsed;}break;}}}process.stdout.write(port);")"
            health_url="http://127.0.0.1:${health_port}/health"
            echo "健康检查地址: $health_url"
            if ! curl -fsS --retry 15 --retry-delay 2 --retry-connrefused "$health_url"; then
              echo "健康检查失败，输出 PM2 诊断信息"
              pm2 status || true
              pm2 describe "${{ env.appName }}" || true
              pm2 logs "${{ env.appName }}" --lines 120 --nostream || true
              exit 1
            fi
            pm2 save
