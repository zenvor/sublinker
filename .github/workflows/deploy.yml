name: Deploy to VPS

on:
  push:
    branches:
      - master

jobs:
  lint:
    name: ESLint Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci
        working-directory: packages/javascript-package

      - name: Run ESLint
        run: npm run lint
        working-directory: packages/javascript-package

  deploy:
    name: Deploy to VPS
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT != '' && secrets.VPS_PORT || 22 }}
          script: |
            export PATH=$PATH:/root/.nvm/versions/node/$(ls /root/.nvm/versions/node)/bin
            cd /opt/CloakGate
            git fetch origin master
            git reset --hard origin/master
            cd packages/javascript-package
            npm ci --omit=dev
            pm2 restart cloakgate || pm2 start src/app.js --name cloakgate
            sleep 3
            curl -f http://localhost:3000/health || exit 1
