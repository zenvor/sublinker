name: Deploy to VPS

on:
  push:
    branches:
      - master
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  deployPath: /opt/CloakGate
  appName: cloakgate
  servicePort: 3000

jobs:
  lint:
    name: ESLint Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint
        run: npm run lint

  deploy:
    name: Pull and restart service
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - name: Deploy on server through SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT || 22 }}
          script: |
            set -euo pipefail

            if [ ! -d "${{ env.deployPath }}/.git" ]; then
              echo "deployPath 不是 git 仓库: ${{ env.deployPath }}"
              exit 1
            fi

            cd "${{ env.deployPath }}"
            git fetch origin "${{ github.ref_name }}"
            git checkout "${{ github.ref_name }}"
            git pull --ff-only origin "${{ github.ref_name }}"

            # 尝试加载 nvm，以保证 node/npm/pm2 在非交互 shell 中可用。
            export NVM_DIR="$HOME/.nvm"
            if [ -s "$NVM_DIR/nvm.sh" ]; then
              . "$NVM_DIR/nvm.sh"
            fi

            if ! command -v node >/dev/null 2>&1; then
              latest_node_dir="$(ls -1d "$HOME/.nvm/versions/node/"*/ 2>/dev/null | sort -V | tail -n 1 || true)"
              if [ -n "${latest_node_dir:-}" ]; then
                export PATH="$latest_node_dir/bin:$PATH"
              fi
            fi
            command -v node >/dev/null 2>&1 || { echo "node not found on server"; exit 1; }
            command -v npm >/dev/null 2>&1 || { echo "npm not found on server"; exit 1; }
            command -v pm2 >/dev/null 2>&1 || { echo "pm2 not found on server"; exit 1; }

            npm ci --omit=dev

            pm2 describe "${{ env.appName }}" >/dev/null 2>&1 && npm run pm2:restart || npm run pm2:start
            sleep 3
            curl -fsS "http://localhost:${{ env.servicePort }}/health"
            pm2 save
